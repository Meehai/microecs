image: python:3.12-bullseye

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

linter:
  before_script:
    - pip install -r requirements.txt
    - export PYTHONPATH="$PYTHONPATH:."
    - pip install ruff pylint
  script:
    - python -m pylint --rcfile=.pylintrc microecs/
    - ruff check

test_and_run:
  before_script:
    - pip install -r requirements.txt
    - export PYTHONPATH="$PYTHONPATH:."
  script:
    - python examples/01-hello-world.py --help
    - pytest test

pages:                                # GitLab Pages: autogenerated API docs (README + microecs/)
  before_script:
    - pip install -r requirements.txt
    - export PYTHONPATH="$PYTHONPATH:."
  script:
    - ./.build_docs.sh public         # must output to public/ for Pages to serve it
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "master"   # deploy only from master, not merge requests
